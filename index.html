<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Clock">
<title>Lab Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --border: #1e1e2e;
    --text: #e2e2e8;
    --text-dim: #6b6b80;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* === CLOCK === */
  .clock-section {
    padding: 20px 24px 12px;
    text-align: center;
    flex-shrink: 0;
  }

  .time {
    font-size: 96px;
    font-weight: 300;
    letter-spacing: 4px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 40px var(--accent-glow);
  }

  .time .seconds {
    font-size: 40px;
    color: var(--accent);
    vertical-align: super;
    margin-left: 4px;
  }

  .date-line {
    font-size: 18px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* === TABS === */
  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 0 24px;
    flex-shrink: 0;
    margin-bottom: 8px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 700;
  }

  .tab-btn:not(.active):hover {
    background: #1a1a2e;
    color: var(--text);
  }

  /* === CONTENT === */
  .content-area {
    flex: 1;
    margin: 0 24px 24px;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .tab-panel {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  .tab-panel.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* YouTube Music panel */
  .yt-panel {
    gap: 20px;
    padding: 24px;
  }

  .yt-icon {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff0000, #cc0000);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .yt-icon svg {
    width: 40px;
    height: 40px;
    fill: #fff;
  }

  .yt-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #ff0000, #cc0000);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
  }

  .yt-btn:active {
    transform: scale(0.97);
  }

  .yt-hint {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* SIGIL panel */
  .sigil-panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .sigil-panel {
    padding: 0;
  }

  .sigil-panel.active {
    display: block;
  }

  .sigil-panel .loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* === BOTTOM STATUS === */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 6px 24px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    letter-spacing: 1px;
    z-index: 10;
  }

  /* Landscape optimizations */
  @media (orientation: landscape) {
    .clock-section { padding: 12px 24px 8px; }
    .time { font-size: 72px; }
    .time .seconds { font-size: 30px; }
    .date-line { font-size: 15px; margin-top: 4px; }
    .tab-bar { margin-bottom: 4px; }
    .tab-btn { padding: 8px 16px; font-size: 12px; }
    .content-area { margin-bottom: 20px; }
  }

  /* Small iPad (9.7") */
  @media (max-width: 810px) {
    .time { font-size: 64px; }
    .time .seconds { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- CLOCK -->
  <div class="clock-section">
    <div class="time" id="clock">
      <span id="hm">00:00</span><span class="seconds" id="sec">00</span>
    </div>
    <div class="date-line" id="dateline">...</div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="youtube" onclick="switchTab('youtube')">YouTube Music</button>
    <button class="tab-btn" data-tab="sigil" onclick="switchTab('sigil')">SIGIL</button>
  </div>

  <!-- CONTENT -->
  <div class="content-area">
    <!-- YouTube Music -->
    <div class="tab-panel yt-panel active" id="panel-youtube">
      <div class="yt-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <a href="https://music.youtube.com" class="yt-btn" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Deschide YouTube Music
      </a>
      <p class="yt-hint">Se deschide in tab nou</p>
    </div>

    <!-- SIGIL -->
    <div class="tab-panel sigil-panel" id="panel-sigil">
      <span class="loading">Se incarca SIGIL...</span>
      <iframe
        src="https://docs.google.com/spreadsheets/d/1QnBI6RWz254xVHdaQD83PrBR5taRvGZrEuK1j606ZRg/edit?rm=minimal"
        loading="lazy"
        onload="this.previousElementSibling.style.display='none'"
      ></iframe>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span>LAB DASHBOARD</span>
    <span id="uptime"></span>
  </div>
</div>

<script>
  var ZILE = ['Duminica', 'Luni', 'Marti', 'Miercuri', 'Joi', 'Vineri', 'Sambata'];
  var LUNI = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie',
              'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hmEl = document.getElementById('hm');
  var secEl = document.getElementById('sec');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hmEl.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
    secEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + ', ' + now.getDate() + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }

  updateClock();
  setInterval(updateClock, 1000);

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  // Wake Lock API (may not be available on iPadOS 16)
  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
