<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hematologie">
<title>Hematologie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --border: #e4e7ec;
    --border-light: #eef0f4;
    --text-primary: #1a1d26;
    --text-secondary: #4a5068;
    --text-tertiary: #8890a4;
    --text-faint: #b4b9c8;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --teal-mid: #5eead4;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --yellow: #ca8a04;
    --yellow-bg: #fefce8;
    --yellow-border: #fef08a;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --orange: #ea580c;
    --orange-bg: #fff7ed;
    --orange-border: #fed7aa;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 14px 20px 8px;
    gap: 10px;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 26px; height: 26px;
    background: var(--teal);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(13,148,136,0.25);
  }

  .brand-mark svg { width: 14px; height: 14px; fill: #fff; }

  .brand-text { font-weight: 600; font-size: 15px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
    letter-spacing: 1px;
    padding: 4px 10px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--teal); border-radius: 50%;
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* === CLOCK === */
  .clock-card {
    background: var(--white);
    border-radius: 14px;
    padding: 20px 32px 16px;
    text-align: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }

  .clock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--teal-mid), var(--teal));
  }

  .clock-face {
    display: flex; align-items: baseline; justify-content: center; line-height: 1;
  }

  .clock-hm {
    font-size: 100px; font-weight: 300;
    letter-spacing: -3px; color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .clock-sep {
    font-size: 80px; font-weight: 300;
    color: var(--teal); margin: 0 2px;
    animation: blink-colon 2s step-end infinite;
  }

  @keyframes blink-colon { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .clock-sec {
    font-family: 'Azeret Mono', monospace;
    font-size: 22px; font-weight: 400;
    color: var(--text-tertiary);
    margin-left: 8px; align-self: flex-start;
    margin-top: 14px; min-width: 2ch;
  }

  .clock-date {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 4px; text-transform: uppercase;
    margin-top: 6px;
  }

  /* === REPORT === */
  .report {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
    gap: 10px; min-height: 0;
  }

  .report::-webkit-scrollbar { width: 4px; }
  .report::-webkit-scrollbar-track { background: transparent; }
  .report::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 4px 0;
  }

  .card {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .row {
    display: flex; align-items: center;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border-light);
    gap: 8px;
  }

  .row:last-child { border-bottom: none; }

  .row-az {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.5px;
    min-width: 90px;
    flex-shrink: 0;
  }

  .row-product {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .row-detail {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    min-width: 50px;
    text-align: right;
    flex-shrink: 0;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.5px;
    min-width: 48px;
    text-align: center;
    flex-shrink: 0;
  }

  .badge-ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-atentie { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-urgent { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .badge-expirat { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .empty-msg {
    padding: 16px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* === FOOTER === */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 4px;
    flex-shrink: 0;
  }

  .footer-item {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* === RESPONSIVE === */
  @media (orientation: landscape) {
    .shell { padding: 8px 20px 4px; gap: 6px; }
    .clock-card { padding: 10px 32px 8px; border-radius: 10px; }
    .clock-hm { font-size: 68px; }
    .clock-sep { font-size: 54px; }
    .clock-sec { font-size: 17px; margin-top: 8px; }
    .clock-date { font-size: 11px; margin-top: 3px; }
    .row { padding: 7px 12px; }
  }

  @media (max-width: 810px) {
    .clock-hm { font-size: 64px; }
    .clock-sep { font-size: 50px; }
    .clock-sec { font-size: 16px; margin-top: 6px; }
  }

  .shell > * { animation: fade-up 0.5s ease both; }
  .shell > *:nth-child(1) { animation-delay: 0s; }
  .shell > *:nth-child(2) { animation-delay: 0.08s; }
  .shell > *:nth-child(3) { animation-delay: 0.14s; }
  .shell > *:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fade-up {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="header-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      </div>
      <span class="brand-text">Hematologie</span>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span id="uptime">UP 0h 00m</span>
    </div>
  </div>

  <div class="clock-card">
    <div class="clock-face">
      <span class="clock-hm" id="hr">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-hm" id="mn">00</span>
      <span class="clock-sec" id="sc">00</span>
    </div>
    <div class="clock-date" id="dateline"></div>
  </div>

  <div class="report" id="report">
    <div class="empty-msg">Se incarca...</div>
  </div>

  <div class="footer">
    <span class="footer-item">Hematologie</span>
    <span class="footer-item" id="gen-date"></span>
  </div>
</div>

<script>
  var ZILE = ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];
  var LUNI = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
              'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hrEl = document.getElementById('hr');
  var mnEl = document.getElementById('mn');
  var scEl = document.getElementById('sc');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hrEl.textContent = pad(now.getHours());
    mnEl.textContent = pad(now.getMinutes());
    scEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + ',  ' +
      now.getDate() + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  function badgeClass(s) {
    return s === 'OK' ? 'badge-ok' : s === 'ATENTIE' ? 'badge-atentie' :
           s === 'URGENT' ? 'badge-urgent' : 'badge-expirat';
  }

  function makeRow(az, product, detail, days, status) {
    var row = document.createElement('div');
    row.className = 'row';

    var azEl = document.createElement('span');
    azEl.className = 'row-az';
    azEl.textContent = az;

    var prodEl = document.createElement('span');
    prodEl.className = 'row-product';
    prodEl.textContent = product;

    var detEl = document.createElement('span');
    detEl.className = 'row-detail';
    detEl.textContent = detail;

    var badge = document.createElement('span');
    badge.className = 'badge ' + badgeClass(status);
    badge.textContent = days;

    row.appendChild(azEl);
    row.appendChild(prodEl);
    row.appendChild(detEl);
    row.appendChild(badge);
    return row;
  }

  function renderReport(data) {
    var el = document.getElementById('report');
    el.textContent = '';
    document.getElementById('gen-date').textContent = 'Actualizat: ' + data.generated;

    // Section 1: On-board (controls + reagents la bord)
    var title1 = document.createElement('div');
    title1.className = 'section-title';
    title1.textContent = 'Stabilitate la bord';
    el.appendChild(title1);

    var card1 = document.createElement('div');
    card1.className = 'card';
    if (data.onboard.length === 0) {
      var em = document.createElement('div');
      em.className = 'empty-msg';
      em.textContent = 'Niciun produs la bord.';
      card1.appendChild(em);
    } else {
      data.onboard.forEach(function(item) {
        var detail = item.used + '/' + item.limit + ' zl';
        var label = item.remaining + 'zl';
        if (item.remaining < 0) label = Math.abs(item.remaining) + 'zl dep';
        card1.appendChild(makeRow(item.analyzer, item.product, detail, label, item.status));
      });
    }
    el.appendChild(card1);

    // Section 2: Expiring within 90 days
    if (data.expiring.length > 0) {
      var title2 = document.createElement('div');
      title2.className = 'section-title';
      title2.textContent = 'Expira in < 90 zile';
      el.appendChild(title2);

      var card2 = document.createElement('div');
      card2.className = 'card';
      data.expiring.forEach(function(item) {
        var detail = 'x' + item.count;
        var label = item.days + 'z';
        if (item.days < 0) label = Math.abs(item.days) + 'z exp';
        card2.appendChild(makeRow(item.analyzer, item.product, detail, label, item.status));
      });
      el.appendChild(card2);
    }
  }

  function loadReport() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.json?t=' + Date.now(), true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        renderReport(JSON.parse(xhr.responseText));
      }
    };
    xhr.send();
  }
  loadReport();
  setInterval(loadReport, 1800000);

  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
