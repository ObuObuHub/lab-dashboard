<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LAB">
<title>LAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --card: #ffffff;
    --border: #e4e7ec;
    --border-light: #eef0f4;
    --divider: #d5d9e2;
    --text-primary: #1a1d26;
    --text-secondary: #4a5068;
    --text-tertiary: #8890a4;
    --text-faint: #b4b9c8;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --teal-mid: #5eead4;
    --teal-dark: #0f766e;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --red-yt: #dc2626;
    --red-yt-light: #fef2f2;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 16px 20px 10px;
    gap: 12px;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 0 4px;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    background: var(--teal);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25);
  }

  .brand-mark svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }

  .brand-text {
    font-weight: 600;
    font-size: 15px;
    color: var(--text-primary);
    letter-spacing: 0.5px;
  }

  .brand-sub {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    margin-left: 8px;
    padding: 2px 8px;
    background: var(--border-light);
    border-radius: 4px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    padding: 4px 10px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* === CLOCK === */
  .clock-card {
    background: var(--white);
    border-radius: 16px;
    padding: 24px 32px 20px;
    text-align: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .clock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--teal-mid), var(--teal));
  }

  .clock-face {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
    line-height: 1;
  }

  .clock-hm {
    font-size: 110px;
    font-weight: 300;
    letter-spacing: -3px;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .clock-sep {
    font-size: 90px;
    font-weight: 300;
    color: var(--teal);
    margin: 0 2px;
    animation: blink-colon 2s step-end infinite;
  }

  @keyframes blink-colon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  .clock-sec {
    font-family: 'Azeret Mono', monospace;
    font-size: 24px;
    font-weight: 400;
    color: var(--text-tertiary);
    margin-left: 8px;
    align-self: flex-start;
    margin-top: 16px;
    min-width: 2ch;
  }

  .clock-date {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* === SIGIL === */
  .sigil-frame {
    flex: 1;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
    background: var(--white);
    box-shadow: var(--shadow);
    min-height: 0;
  }

  .sigil-frame iframe { width: 100%; height: 100%; border: none; }

  .sigil-loader {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .sigil-loader-ring {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .sigil-loader-text {
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
  }

  /* === FOOTER === */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  .footer-item {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* === RESPONSIVE === */
  @media (orientation: landscape) {
    .shell { padding: 10px 20px 6px; gap: 8px; }
    .clock-card { padding: 14px 32px 12px; border-radius: 12px; }
    .clock-hm { font-size: 80px; }
    .clock-sep { font-size: 64px; }
    .clock-sec { font-size: 20px; margin-top: 10px; }
    .clock-date { font-size: 12px; margin-top: 4px; }
    .sigil-frame { border-radius: 10px; }
  }

  @media (max-width: 810px) {
    .clock-hm { font-size: 72px; }
    .clock-sep { font-size: 56px; }
    .clock-sec { font-size: 18px; margin-top: 8px; }
  }

  /* Entry */
  .shell > * {
    animation: fade-up 0.5s ease both;
  }
  .shell > *:nth-child(1) { animation-delay: 0s; }
  .shell > *:nth-child(2) { animation-delay: 0.08s; }
  .shell > *:nth-child(3) { animation-delay: 0.14s; }
  .shell > *:nth-child(4) { animation-delay: 0.2s; }
  .shell > *:nth-child(5) { animation-delay: 0.26s; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      </div>
      <span class="brand-text">Laborator Hematologie</span>
      <span class="brand-sub">LAM</span>
    </div>
    <div class="header-status">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="uptime">UP 0h 00m</span>
      </div>
    </div>
  </div>

  <!-- CLOCK -->
  <div class="clock-card">
    <div class="clock-face">
      <span class="clock-hm" id="hr">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-hm" id="mn">00</span>
      <span class="clock-sec" id="sc">00</span>
    </div>
    <div class="clock-date" id="dateline"></div>
  </div>

  <!-- SIGIL -->
  <div class="sigil-frame">
    <div class="sigil-loader" id="sigil-loader">
      <div class="sigil-loader-ring"></div>
      <span class="sigil-loader-text">Se incarca SIGIL...</span>
    </div>
    <iframe
      src="https://docs.google.com/spreadsheets/d/1QnBI6RWz254xVHdaQD83PrBR5taRvGZrEuK1j606ZRg/edit?rm=minimal"
      onload="document.getElementById('sigil-loader').style.display='none'"
    ></iframe>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-item">Spitalul Prof. Dr. Eduard Apetrei</span>
    <span class="footer-item" id="footer-date"></span>
  </div>
</div>

<script>
  var ZILE = ['Duminica', 'Luni', 'Marti', 'Miercuri', 'Joi', 'Vineri', 'Sambata'];
  var LUNI = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie',
              'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hrEl = document.getElementById('hr');
  var mnEl = document.getElementById('mn');
  var scEl = document.getElementById('sc');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hrEl.textContent = pad(now.getHours());
    mnEl.textContent = pad(now.getMinutes());
    scEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + ',  ' +
      now.getDate() + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }

  updateClock();
  setInterval(updateClock, 1000);

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
