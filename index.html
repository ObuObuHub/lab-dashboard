<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LAB">
<title>LAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --border: #e4e7ec;
    --border-light: #eef0f4;
    --text-primary: #1a1d26;
    --text-secondary: #4a5068;
    --text-tertiary: #8890a4;
    --text-faint: #b4b9c8;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --teal-mid: #5eead4;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --yellow: #ca8a04;
    --yellow-bg: #fefce8;
    --yellow-border: #fef08a;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --orange: #ea580c;
    --orange-bg: #fff7ed;
    --orange-border: #fed7aa;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 16px 20px 10px;
    gap: 12px;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 0 4px;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    background: var(--teal);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25);
  }

  .brand-mark svg { width: 16px; height: 16px; fill: #fff; }

  .brand-text {
    font-weight: 600;
    font-size: 15px;
    color: var(--text-primary);
    letter-spacing: 0.5px;
  }

  .brand-sub {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    margin-left: 8px;
    padding: 2px 8px;
    background: var(--border-light);
    border-radius: 4px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    padding: 4px 10px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* === CLOCK === */
  .clock-card {
    background: var(--white);
    border-radius: 16px;
    padding: 24px 32px 20px;
    text-align: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .clock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--teal-mid), var(--teal));
  }

  .clock-face {
    display: flex;
    align-items: baseline;
    justify-content: center;
    line-height: 1;
  }

  .clock-hm {
    font-size: 110px;
    font-weight: 300;
    letter-spacing: -3px;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .clock-sep {
    font-size: 90px;
    font-weight: 300;
    color: var(--teal);
    margin: 0 2px;
    animation: blink-colon 2s step-end infinite;
  }

  @keyframes blink-colon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  .clock-sec {
    font-family: 'Azeret Mono', monospace;
    font-size: 24px;
    font-weight: 400;
    color: var(--text-tertiary);
    margin-left: 8px;
    align-self: flex-start;
    margin-top: 16px;
    min-width: 2ch;
  }

  .clock-date {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* === REPORT === */
  .report {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .report::-webkit-scrollbar { width: 4px; }
  .report::-webkit-scrollbar-track { background: transparent; }
  .report::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .analyzer-card {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .analyzer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--border-light);
    border-bottom: 1px solid var(--border);
  }

  .analyzer-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--text-primary);
    letter-spacing: 0.3px;
  }

  .analyzer-count {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
  }

  .product-row {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-light);
    gap: 12px;
  }

  .product-row:last-child { border-bottom: none; }

  .product-name {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .product-count {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    min-width: 24px;
    text-align: center;
  }

  .product-days {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    min-width: 64px;
    text-align: right;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge-ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-atentie { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-urgent { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .badge-expirat { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .report-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  /* === FOOTER === */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  .footer-item {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* === RESPONSIVE === */
  @media (orientation: landscape) {
    .shell { padding: 10px 20px 6px; gap: 8px; }
    .clock-card { padding: 12px 32px 10px; border-radius: 12px; }
    .clock-hm { font-size: 72px; }
    .clock-sep { font-size: 56px; }
    .clock-sec { font-size: 18px; margin-top: 8px; }
    .clock-date { font-size: 11px; margin-top: 4px; }
    .report { gap: 6px; }
    .analyzer-header { padding: 8px 14px; }
    .product-row { padding: 6px 14px; }
  }

  @media (max-width: 810px) {
    .clock-hm { font-size: 64px; }
    .clock-sep { font-size: 50px; }
    .clock-sec { font-size: 16px; margin-top: 6px; }
  }

  /* Entry */
  .shell > * { animation: fade-up 0.5s ease both; }
  .shell > *:nth-child(1) { animation-delay: 0s; }
  .shell > *:nth-child(2) { animation-delay: 0.08s; }
  .shell > *:nth-child(3) { animation-delay: 0.14s; }
  .shell > *:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      </div>
      <span class="brand-text">Laborator Hematologie</span>
      <span class="brand-sub">LAM</span>
    </div>
    <div class="header-status">
      <div class="status-pill" id="report-gen">
        <span class="status-dot"></span>
        <span id="uptime">UP 0h 00m</span>
      </div>
    </div>
  </div>

  <!-- CLOCK -->
  <div class="clock-card">
    <div class="clock-face">
      <span class="clock-hm" id="hr">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-hm" id="mn">00</span>
      <span class="clock-sec" id="sc">00</span>
    </div>
    <div class="clock-date" id="dateline"></div>
  </div>

  <!-- REPORT -->
  <div class="report" id="report">
    <div class="report-empty">Se incarca raportul SIGIL...</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-item">Spitalul Prof. Dr. Eduard Apetrei</span>
    <span class="footer-item" id="gen-date"></span>
  </div>
</div>

<script>
  var ZILE = ['Duminica', 'Luni', 'Marti', 'Miercuri', 'Joi', 'Vineri', 'Sambata'];
  var LUNI = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie',
              'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hrEl = document.getElementById('hr');
  var mnEl = document.getElementById('mn');
  var scEl = document.getElementById('sc');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hrEl.textContent = pad(now.getHours());
    mnEl.textContent = pad(now.getMinutes());
    scEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + ',  ' +
      now.getDate() + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  // Render report from data.json
  function badgeClass(status) {
    if (status === 'OK') return 'badge-ok';
    if (status === 'ATENTIE') return 'badge-atentie';
    if (status === 'URGENT') return 'badge-urgent';
    return 'badge-expirat';
  }

  function daysLabel(d) {
    if (d < 0) return Math.abs(d) + 'z exp';
    return d + 'z';
  }

  function renderReport(data) {
    var el = document.getElementById('report');
    var genEl = document.getElementById('gen-date');
    genEl.textContent = 'Actualizat: ' + data.generated;

    var html = [];
    var order = ['DxH 690T', 'MINDRAY BC-5380', 'ACL ELITE PRO', 'Coloranti', 'Grupe+Rh'];
    var keys = order.filter(function(k) { return data.analyzers[k]; });
    // Add any remaining
    Object.keys(data.analyzers).forEach(function(k) {
      if (keys.indexOf(k) === -1) keys.push(k);
    });

    keys.forEach(function(az) {
      var products = data.analyzers[az];
      var card = document.createElement('div');
      card.className = 'analyzer-card';

      var hdr = document.createElement('div');
      hdr.className = 'analyzer-header';
      var name = document.createElement('span');
      name.className = 'analyzer-name';
      name.textContent = az;
      var cnt = document.createElement('span');
      cnt.className = 'analyzer-count';
      cnt.textContent = products.length + ' produse';
      hdr.appendChild(name);
      hdr.appendChild(cnt);
      card.appendChild(hdr);

      products.forEach(function(p) {
        var row = document.createElement('div');
        row.className = 'product-row';

        var pname = document.createElement('span');
        pname.className = 'product-name';
        pname.textContent = p.product;

        var pcount = document.createElement('span');
        pcount.className = 'product-count';
        pcount.textContent = 'x' + p.count;

        var badge = document.createElement('span');
        badge.className = 'badge ' + badgeClass(p.status);
        badge.textContent = daysLabel(p.days);

        row.appendChild(pname);
        row.appendChild(pcount);
        row.appendChild(badge);
        card.appendChild(row);
      });

      el.appendChild(card);
    });
  }

  function loadReport() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.json?t=' + Date.now(), true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        var data = JSON.parse(xhr.responseText);
        var el = document.getElementById('report');
        el.textContent = '';
        renderReport(data);
      }
    };
    xhr.onerror = function() {
      document.getElementById('report').textContent = 'Eroare la incarcarea raportului.';
    };
    xhr.send();
  }

  loadReport();
  // Refresh report every 30 minutes
  setInterval(loadReport, 1800000);

  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
