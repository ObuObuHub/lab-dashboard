<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LAB">
<title>LAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap');

  :root {
    --void: #06070a;
    --deep: #0c0e14;
    --panel: #11131a;
    --panel-edge: #1a1d28;
    --ridge: #252835;
    --ghost: #3a3f52;
    --muted: #5c6178;
    --soft: #8b90a5;
    --text: #c8cbd8;
    --bright: #e8eaf2;
    --white: #f4f5f9;
    --cyan: #22d3ee;
    --cyan-dim: #0e7490;
    --cyan-glow: rgba(34, 211, 238, 0.08);
    --cyan-flare: rgba(34, 211, 238, 0.25);
    --amber: #fbbf24;
    --amber-dim: #92400e;
    --red-yt: #e83030;
    --red-yt-glow: rgba(232, 48, 48, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--void);
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
  }

  /* === LAYOUT === */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 16px 20px 8px;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern overlay */
  .shell::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--panel-edge) 1px, transparent 1px),
      linear-gradient(90deg, var(--panel-edge) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.15;
    pointer-events: none;
  }

  /* Top horizon glow */
  .shell::after {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 160px;
    background: radial-gradient(ellipse, var(--cyan-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  /* === HEADER BAR === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 0 4px;
    position: relative;
    z-index: 2;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 8px;
    height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan-flare), 0 0 20px var(--cyan-glow);
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--cyan-flare), 0 0 20px var(--cyan-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 4px var(--cyan-glow); }
  }

  .brand-text {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .header-meta {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 2px;
  }

  /* === CLOCK REGION === */
  .clock-region {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 8px 0 4px;
    position: relative;
    z-index: 2;
  }

  .clock-face {
    display: flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }

  .clock-hm {
    font-size: 120px;
    font-weight: 200;
    letter-spacing: -2px;
    color: var(--white);
    font-variant-numeric: tabular-nums;
  }

  .clock-sep {
    font-size: 100px;
    font-weight: 200;
    color: var(--cyan);
    animation: blink-colon 2s step-end infinite;
    margin: 0 2px;
  }

  @keyframes blink-colon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .clock-sec {
    font-family: 'Azeret Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--cyan-dim);
    margin-left: 8px;
    align-self: flex-start;
    margin-top: 18px;
    min-width: 2ch;
  }

  .clock-date {
    font-size: 15px;
    font-weight: 300;
    color: var(--soft);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Decorative line under clock */
  .clock-rule {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ridge), var(--cyan-dim), var(--ridge), transparent);
    margin-top: 14px;
    opacity: 0.5;
  }

  /* === NAVIGATION === */
  .nav-strip {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    padding: 0 2px;
    position: relative;
    z-index: 2;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    color: var(--muted);
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .nav-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: transparent;
    transition: background 0.3s ease;
  }

  .nav-btn.active {
    background: var(--deep);
    color: var(--bright);
    border-color: var(--ridge);
  }

  .nav-btn.active::before {
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-flare);
  }

  .nav-btn.active[data-tab="youtube"]::before {
    background: var(--red-yt);
    box-shadow: 0 0 12px var(--red-yt-glow);
  }

  .nav-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* === VIEWPORT === */
  .viewport {
    flex: 1;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--panel-edge);
    border-top: none;
    background: var(--deep);
    z-index: 2;
    min-height: 0;
  }

  .view {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    animation: view-in 0.4s ease;
  }

  .view.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  @keyframes view-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === YOUTUBE MUSIC VIEW === */
  .yt-view {
    gap: 28px;
    padding: 32px;
    position: relative;
  }

  .yt-disc {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid var(--ridge);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(circle at 30% 30%, var(--panel), var(--void));
  }

  .yt-disc::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid var(--ghost);
    opacity: 0.3;
  }

  .yt-disc::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--red-yt);
    box-shadow: 0 0 16px rgba(232, 48, 48, 0.4);
  }

  .yt-disc svg {
    width: 32px;
    height: 32px;
    fill: var(--soft);
    position: relative;
    z-index: 1;
    display: none;
  }

  .yt-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 36px;
    background: transparent;
    border: 1px solid var(--ridge);
    color: var(--bright);
    text-decoration: none;
    border-radius: 6px;
    font-family: 'Azeret Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .yt-link:active {
    background: var(--red-yt-glow);
    border-color: var(--red-yt);
  }

  .yt-link svg {
    width: 16px;
    height: 16px;
    fill: var(--red-yt);
  }

  .yt-sub {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 2px;
  }

  /* === SIGIL VIEW === */
  .sigil-view {
    padding: 0;
  }

  .sigil-view.active {
    display: block;
  }

  .sigil-view iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .sigil-loader {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .sigil-loader-ring {
    width: 32px;
    height: 32px;
    border: 2px solid var(--panel-edge);
    border-top-color: var(--cyan-dim);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .sigil-loader-text {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* === FOOTER === */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 6px 2px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .footer-item {
    font-family: 'Azeret Mono', monospace;
    font-size: 9px;
    color: var(--ghost);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .footer-dot {
    width: 4px;
    height: 4px;
    background: var(--cyan-dim);
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* === RESPONSIVE === */
  @media (orientation: landscape) {
    .shell { padding: 10px 20px 6px; gap: 6px; }
    .clock-hm { font-size: 88px; }
    .clock-sep { font-size: 72px; }
    .clock-sec { font-size: 22px; margin-top: 12px; }
    .clock-date { font-size: 13px; letter-spacing: 5px; margin-top: 4px; }
    .clock-rule { margin-top: 8px; }
    .clock-region { padding: 2px 0; }
    .nav-btn { padding: 8px 12px; font-size: 10px; }
  }

  @media (max-width: 810px) {
    .clock-hm { font-size: 80px; }
    .clock-sep { font-size: 64px; }
    .clock-sec { font-size: 20px; margin-top: 10px; }
  }

  /* Entry animation */
  .shell > * {
    animation: fade-up 0.6s ease both;
  }
  .shell > *:nth-child(1) { animation-delay: 0s; }
  .shell > *:nth-child(2) { animation-delay: 0.1s; }
  .shell > *:nth-child(3) { animation-delay: 0.2s; }
  .shell > *:nth-child(4) { animation-delay: 0.25s; }
  .shell > *:nth-child(5) { animation-delay: 0.3s; }
  .shell > *:nth-child(6) { animation-delay: 0.35s; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-mark"></div>
      <span class="brand-text">Lab Control</span>
    </div>
    <span class="header-meta" id="uptime">SYS UP 0h 00m</span>
  </div>

  <!-- CLOCK -->
  <div class="clock-region">
    <div class="clock-face">
      <span class="clock-hm" id="hr">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-hm" id="mn">00</span>
      <span class="clock-sec" id="sc">00</span>
    </div>
    <div class="clock-date" id="dateline"></div>
    <div class="clock-rule"></div>
  </div>

  <!-- NAV -->
  <div class="nav-strip">
    <button class="nav-btn active" data-tab="youtube" onclick="switchTab('youtube')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      YouTube Music
    </button>
    <button class="nav-btn" data-tab="sigil" onclick="switchTab('sigil')">
      <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm2 2h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"/></svg>
      SIGIL
    </button>
  </div>

  <!-- VIEWPORT -->
  <div class="viewport">
    <!-- YouTube Music -->
    <div class="view yt-view active" id="panel-youtube">
      <div class="yt-disc"></div>
      <a href="https://music.youtube.com" class="yt-link" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Deschide Player
      </a>
      <span class="yt-sub">music.youtube.com</span>
    </div>

    <!-- SIGIL -->
    <div class="view sigil-view" id="panel-sigil">
      <div class="sigil-loader" id="sigil-loader">
        <div class="sigil-loader-ring"></div>
        <span class="sigil-loader-text">Loading SIGIL</span>
      </div>
      <iframe
        src="https://docs.google.com/spreadsheets/d/1QnBI6RWz254xVHdaQD83PrBR5taRvGZrEuK1j606ZRg/edit?rm=minimal"
        loading="lazy"
        onload="document.getElementById('sigil-loader').style.display='none'"
      ></iframe>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-item"><span class="footer-dot"></span>Hematologie LAM</span>
    <span class="footer-item">iPadOS 16</span>
  </div>
</div>

<script>
  var ZILE = ['Duminica', 'Luni', 'Marti', 'Miercuri', 'Joi', 'Vineri', 'Sambata'];
  var LUNI = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hrEl = document.getElementById('hr');
  var mnEl = document.getElementById('mn');
  var scEl = document.getElementById('sc');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hrEl.textContent = pad(now.getHours());
    mnEl.textContent = pad(now.getMinutes());
    scEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + '  /  ' +
      pad(now.getDate()) + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }

  updateClock();
  setInterval(updateClock, 1000);

  function switchTab(tab) {
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.view').forEach(function(p) { p.classList.remove('active'); });
    document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'SYS UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
