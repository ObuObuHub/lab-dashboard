<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hematologie">
<title>Hematologie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --glass: rgba(255,255,255,0.85);
    --border: #e0e4ea;
    --border-subtle: #eaecf0;
    --text-hero: #0f1419;
    --text-primary: #1d2939;
    --text-secondary: #475467;
    --text-tertiary: #98a2b3;
    --text-ghost: #c0c7d2;
    --accent: #0d9488;
    --accent-light: #99f6e4;
    --accent-wash: #f0fdfa;
    --accent-deep: #0f766e;
    --green: #12b76a;
    --green-bg: #ecfdf3;
    --green-border: #a6f4c5;
    --yellow: #f79009;
    --yellow-bg: #fffaeb;
    --yellow-border: #fedf89;
    --orange: #ef6820;
    --orange-bg: #fff4ed;
    --orange-border: #fddcab;
    --red: #f04438;
    --red-bg: #fef3f2;
    --red-border: #fecdca;
    --ring-track: #e8ecf1;
    --shadow-clock: 0 8px 40px rgba(13,148,136,0.08), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Figtree', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle dot grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #d5dae0 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: 16px 24px 10px;
    gap: 14px;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
  }

  .brand-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #dc2626, #991b1b);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 10px rgba(220,38,38,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .brand-icon svg { width: 18px; height: 18px; fill: #fff; }

  .brand-label {
    font-weight: 700; font-size: 16px;
    color: var(--text-hero);
    letter-spacing: -0.2px;
  }

  .header-pills {
    display: flex; gap: 8px;
  }

  .pill {
    display: flex; align-items: center; gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
    letter-spacing: 0.5px;
    padding: 5px 12px;
    background: var(--white);
    border: 1px solid var(--border-subtle);
    border-radius: 100px;
    backdrop-filter: blur(8px);
  }

  .pill-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(13,148,136,0.4);
    animation: glow 2.5s ease-in-out infinite;
  }

  @keyframes glow {
    0%,100% { box-shadow: 0 0 6px rgba(13,148,136,0.4); }
    50% { box-shadow: 0 0 12px rgba(13,148,136,0.6); }
  }

  /* === CLOCK === */
  .clock-panel {
    background: var(--white);
    border-radius: 20px;
    padding: 32px 40px 26px;
    text-align: center;
    flex-shrink: 0;
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-clock);
    position: relative;
    overflow: hidden;
  }

  /* Accent gradient bar */
  .clock-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      var(--accent-deep) 0%,
      var(--accent) 30%,
      var(--accent-light) 50%,
      var(--accent) 70%,
      var(--accent-deep) 100%
    );
    background-size: 200% 100%;
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%,100% { background-position: 200% 0; }
    50% { background-position: 0% 0; }
  }

  /* Subtle radial glow behind clock */
  .clock-panel::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 200px;
    background: radial-gradient(ellipse, rgba(13,148,136,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .clock-time {
    display: flex;
    align-items: baseline;
    justify-content: center;
    line-height: 1;
    position: relative; z-index: 1;
  }

  .clock-h, .clock-m {
    font-size: 140px;
    font-weight: 300;
    letter-spacing: -6px;
    color: var(--text-hero);
    font-variant-numeric: tabular-nums;
    transition: opacity 0.15s;
  }

  .clock-colon {
    font-size: 120px;
    font-weight: 200;
    color: var(--accent);
    margin: 0 -2px;
    opacity: 0.8;
  }

  @keyframes blink { 0%,100%{opacity:0.8} 50%{opacity:0.1} }

  .clock-s {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--text-tertiary);
    margin-left: 10px;
    align-self: flex-start;
    margin-top: 22px;
    min-width: 2.2ch;
    position: relative; z-index: 1;
  }

  .clock-date {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 10px;
    position: relative; z-index: 1;
  }

  /* === SECTIONS === */
  .sections {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
    gap: 16px;
    min-height: 0;
    padding-bottom: 4px;
  }

  .sections::-webkit-scrollbar { width: 3px; }
  .sections::-webkit-scrollbar-track { background: transparent; }
  .sections::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Section header */
  .sec-head {
    display: flex; align-items: center; gap: 8px;
    padding: 0 2px;
  }

  .sec-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .sec-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Gauge cards for on-board */
  .gauges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .gauge-card {
    flex: 1;
    min-width: 140px;
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-card);
    padding: 16px 12px 14px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .gauge-ring {
    position: relative;
    width: 72px; height: 72px;
  }

  .gauge-ring svg {
    width: 72px; height: 72px;
    transform: rotate(-90deg);
  }

  .gauge-ring .track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 5;
  }

  .gauge-ring .fill {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease, stroke 0.5s;
  }

  .gauge-value {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-hero);
  }

  .gauge-value small {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .gauge-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.3;
  }

  .gauge-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-ghost);
    letter-spacing: 0.5px;
  }

  /* Expiry list */
  .exp-card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }

  .exp-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 10px;
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.2s;
  }

  .exp-row:last-child { border-bottom: none; }

  .exp-az {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-ghost);
    letter-spacing: 0.3px;
    min-width: 80px;
    flex-shrink: 0;
  }

  .exp-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .exp-qty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-ghost);
    flex-shrink: 0;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    min-width: 48px;
    justify-content: center;
    flex-shrink: 0;
  }

  .tag-ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .tag-atentie { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .tag-urgent { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .tag-expirat { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* === FOOTER === */
  .foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .foot span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-ghost);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* === RESPONSIVE === */
  @media (orientation: landscape) {
    .shell { padding: 10px 24px 6px; gap: 8px; }
    .clock-panel { padding: 16px 40px 12px; border-radius: 16px; }
    .clock-h, .clock-m { font-size: 100px; letter-spacing: -4px; }
    .clock-colon { font-size: 84px; }
    .clock-s { font-size: 22px; margin-top: 14px; }
    .clock-date { font-size: 12px; margin-top: 6px; letter-spacing: 5px; }
    .gauge-ring { width: 60px; height: 60px; }
    .gauge-ring svg { width: 60px; height: 60px; }
    .gauge-value { font-size: 15px; }
    .gauge-card { padding: 12px 10px 10px; }
  }

  @media (max-width: 810px) {
    .clock-h, .clock-m { font-size: 100px; }
    .clock-colon { font-size: 80px; }
    .clock-s { font-size: 22px; margin-top: 14px; }
  }

  /* Entry choreography */
  .shell > * {
    animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  .shell > *:nth-child(1) { animation-delay: 0s; }
  .shell > *:nth-child(2) { animation-delay: 0.12s; }
  .shell > *:nth-child(3) { animation-delay: 0.22s; }
  .shell > *:nth-child(4) { animation-delay: 0.32s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2.69l-1.34 1.6C8.4 7.05 4 12.36 4 16c0 4.42 3.58 8 8 8s8-3.58 8-8c0-3.64-4.4-8.95-6.66-11.71L12 2.69z"/></svg>
      </div>
      <span class="brand-label">Hematologie</span>
    </div>
    <div class="header-pills">
      <div class="pill">
        <span class="pill-dot"></span>
        <span id="uptime">UP 0h 00m</span>
      </div>
    </div>
  </div>

  <!-- CLOCK -->
  <div class="clock-panel">
    <div class="clock-time">
      <span class="clock-h" id="hr">00</span>
      <span class="clock-colon">:</span>
      <span class="clock-m" id="mn">00</span>
      <span class="clock-s" id="sc">00</span>
    </div>
    <div class="clock-date" id="dateline"></div>
  </div>

  <!-- SECTIONS -->
  <div class="sections" id="report">
    <div style="text-align:center;color:var(--text-tertiary);padding:24px;font-size:13px;">Se incarca...</div>
  </div>

  <!-- FOOTER -->
  <div class="foot">
    <span>Hematologie</span>
    <span id="gen-date"></span>
  </div>
</div>

<script>
  var ZILE = ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];
  var LUNI = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
              'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  var hrEl = document.getElementById('hr');
  var mnEl = document.getElementById('mn');
  var scEl = document.getElementById('sc');
  var dateEl = document.getElementById('dateline');

  function updateClock() {
    var now = new Date();
    hrEl.textContent = pad(now.getHours());
    mnEl.textContent = pad(now.getMinutes());
    scEl.textContent = pad(now.getSeconds());
    dateEl.textContent = ZILE[now.getDay()] + ',  ' +
      now.getDate() + ' ' + LUNI[now.getMonth()] + ' ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  var startTime = Date.now();
  var uptimeEl = document.getElementById('uptime');
  function updateUptime() {
    var diff = Date.now() - startTime;
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    uptimeEl.textContent = 'UP ' + hrs + 'h ' + pad(mins) + 'm';
  }
  setInterval(updateUptime, 60000);
  updateUptime();

  function statusColor(s) {
    return s === 'OK' ? 'var(--green)' : s === 'ATENTIE' ? 'var(--yellow)' :
           s === 'URGENT' ? 'var(--orange)' : 'var(--red)';
  }
  function tagClass(s) {
    return 'tag tag-' + (s === 'OK' ? 'ok' : s === 'ATENTIE' ? 'atentie' :
           s === 'URGENT' ? 'urgent' : 'expirat');
  }

  function makeGauge(item) {
    var card = document.createElement('div');
    card.className = 'gauge-card';

    var pct = Math.max(0, Math.min(1, item.remaining / item.limit));
    var R = 30;
    var C = 2 * Math.PI * R;
    var offset = C * (1 - pct);
    var color = statusColor(item.status);

    var ring = document.createElement('div');
    ring.className = 'gauge-ring';

    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 72 72');

    var track = document.createElementNS(ns, 'circle');
    track.setAttribute('class', 'track');
    track.setAttribute('cx', '36'); track.setAttribute('cy', '36'); track.setAttribute('r', String(R));

    var fill = document.createElementNS(ns, 'circle');
    fill.setAttribute('class', 'fill');
    fill.setAttribute('cx', '36'); fill.setAttribute('cy', '36'); fill.setAttribute('r', String(R));
    fill.setAttribute('stroke', color);
    fill.setAttribute('stroke-dasharray', String(C));
    fill.setAttribute('stroke-dashoffset', String(C));

    svg.appendChild(track);
    svg.appendChild(fill);
    ring.appendChild(svg);

    var val = document.createElement('div');
    val.className = 'gauge-value';
    var num = document.createElement('span');
    num.textContent = item.remaining;
    var unit = document.createElement('small');
    unit.textContent = 'zl';
    val.appendChild(num);
    val.appendChild(unit);
    ring.appendChild(val);

    var name = document.createElement('div');
    name.className = 'gauge-name';
    name.textContent = item.product;

    var sub = document.createElement('div');
    sub.className = 'gauge-sub';
    sub.textContent = item.used + '/' + item.limit + ' zile';

    card.appendChild(ring);
    card.appendChild(name);
    card.appendChild(sub);

    // Animate after render
    setTimeout(function() {
      fill.setAttribute('stroke-dashoffset', String(offset));
    }, 300);

    return card;
  }

  function renderReport(data) {
    var el = document.getElementById('report');
    el.textContent = '';
    document.getElementById('gen-date').textContent = 'Actualizat: ' + data.generated;

    // Section 1: On-board gauges
    var h1 = document.createElement('div');
    h1.className = 'sec-head';
    var l1 = document.createElement('span');
    l1.className = 'sec-label';
    l1.textContent = 'Stabilitate la bord';
    var line1 = document.createElement('div');
    line1.className = 'sec-line';
    h1.appendChild(l1);
    h1.appendChild(line1);
    el.appendChild(h1);

    var gauges = document.createElement('div');
    gauges.className = 'gauges';
    data.onboard.forEach(function(item) {
      gauges.appendChild(makeGauge(item));
    });
    el.appendChild(gauges);

    // Section 2: Expiry list
    if (data.expiring.length > 0) {
      var h2 = document.createElement('div');
      h2.className = 'sec-head';
      var l2 = document.createElement('span');
      l2.className = 'sec-label';
      l2.textContent = 'Expira in < 90 zile';
      var line2 = document.createElement('div');
      line2.className = 'sec-line';
      h2.appendChild(l2);
      h2.appendChild(line2);
      el.appendChild(h2);

      var card = document.createElement('div');
      card.className = 'exp-card';
      data.expiring.forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'exp-row';

        var az = document.createElement('span');
        az.className = 'exp-az';
        az.textContent = item.analyzer;

        var nm = document.createElement('span');
        nm.className = 'exp-name';
        nm.textContent = item.product;

        var qty = document.createElement('span');
        qty.className = 'exp-qty';
        qty.textContent = 'x' + item.count;

        var tag = document.createElement('span');
        tag.className = tagClass(item.status);
        tag.textContent = item.days < 0 ? Math.abs(item.days) + 'z exp' : item.days + 'z';

        row.appendChild(az);
        row.appendChild(nm);
        row.appendChild(qty);
        row.appendChild(tag);
        card.appendChild(row);
      });
      el.appendChild(card);
    }
  }

  function loadReport() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.json?t=' + Date.now(), true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        renderReport(JSON.parse(xhr.responseText));
      }
    };
    xhr.send();
  }
  loadReport();
  setInterval(loadReport, 1800000);

  var wakeLock = null;
  function requestWakeLock() {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(function(wl) {
        wakeLock = wl;
      }).catch(function() {});
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
